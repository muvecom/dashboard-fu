    <script>
        const WEBHOOK_URL = 'https://evo.muvecom.com.br/webhook/de8b08a0-e58e-4f02-b34c-218a682f9924';
        
        let currentToken = null;
        let globalRawSessions = []; 
        let globalProcessedLeads = []; 
        let currentFilteredLeads = [];
        let chartStatus, chartResponsabilidade, chartTempo;
        let activePieFilter = null;
        let currentPage = 1;
        const itemsPerPage = 10;

        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date();
            const oneMonthAgo = new Date();
            oneMonthAgo.setDate(today.getDate() - 30);

            const urlParams = new URLSearchParams(window.location.search);
            const nomeParam = urlParams.get('nome');
            const tokenParam = urlParams.get('token');

            if (nomeParam) {
                document.getElementById('dashboard-title').innerHTML = `<i class="fas fa-clock"></i> Monitor Follow-up - ${nomeParam}`;
            }

            document.getElementById('startDate').value = oneMonthAgo.toISOString().split('T')[0];
            document.getElementById('endDate').value = today.toISOString().split('T')[0];

            if (tokenParam) {
                currentToken = tokenParam;
                const newUrl = window.location.pathname + window.location.search.replace(/[\?&]token=[^&]+/, '').replace(/^&/, '?');
                window.history.replaceState({}, '', newUrl);
                loadData();
            } else {
                document.getElementById('tokenModal').classList.add('active');
            }

            document.getElementById('startDate').addEventListener('change', () => { if (globalRawSessions.length) processLeads(); });
            document.getElementById('endDate').addEventListener('change', () => { if (globalRawSessions.length) processLeads(); });
        });

        function saveTokenAndLoad() {
            currentToken = document.getElementById('tokenInput').value.trim();
            if (currentToken) {
                document.getElementById('tokenModal').classList.remove('active');
                loadData();
            }
        }

        async function loadData() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: currentToken })
                });
                const rawData = await response.json();
                globalRawSessions = Array.isArray(rawData) ? rawData : (rawData.content || []);
                processLeads();
            } catch (error) {
                console.error(error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('tokenModal').classList.add('active');
                alert("Erro ao conectar ou token inválido.");
            }
        }

        function processLeads() {
            const startDateStr = document.getElementById('startDate').value;
            const endDateStr = document.getElementById('endDate').value;
            const startDate = startDateStr ? new Date(startDateStr + 'T00:00:00') : new Date('2000-01-01');
            const endDate = endDateStr ? new Date(endDateStr + 'T23:59:59') : new Date('2100-01-01');

            const leadsMap = new Map();
            const now = new Date();

            globalRawSessions.forEach(s => {
                const sessionDate = new Date(s.createdAt || s.ultInteracao || s.data || Date.now());
                if (sessionDate < startDate || sessionDate > endDate) return;

                let leadId = s.telefone && s.telefone !== "Sem Telefone" ? s.telefone : s.id;
                const leadName = s.contactName || s.contato || s.name || "Desconhecido";

                const rawMsgs = s.messages || s.mensagens || [];
                if (rawMsgs.length === 0) return;

                // Captura a última mensagem cronológica real do array
                const lastMsg = rawMsgs[rawMsgs.length - 1];
                
                // Valida o remetente de forma correta sem inverter booleano
                const isBotOrMe = lastMsg.fromBot === true || lastMsg.fromMe === true || lastMsg.isBot === true || lastMsg.sender === 'bot' || lastMsg.sender === 'agent';
                const lastSender = isBotOrMe ? 'EMPRESA' : 'CLIENTE';

                const idleTimeMs = now - sessionDate;
                const idleHours = Math.floor(idleTimeMs / (1000 * 60 * 60));

                let statusFollow = 'AGUARDANDO_CLIENTE'; // No prazo
                if (lastSender === 'CLIENTE') {
                    statusFollow = 'AGUARDANDO_VENDEDOR'; // Urgente: bola com a empresa
                } else if (lastSender === 'EMPRESA' && idleHours >= 24) {
                    statusFollow = 'FOLLOW_UP_PENDENTE'; // Passou de 24h sem resposta do cliente: cobrar
                }

                if (leadsMap.has(leadId)) {
                    const existing = leadsMap.get(leadId);
                    if (sessionDate > existing.lastDate) {
                        existing.lastDate = sessionDate;
                        existing.lastSender = lastSender;
                        existing.status = statusFollow;
                        existing.idleHours = idleHours;
                        existing.sessionId = s.id;
                    }
                    existing.msgTotal += rawMsgs.length;
                } else {
                    leadsMap.set(leadId, {
                        phoneId: leadId,
                        name: leadName,
                        lastDate: sessionDate,
                        lastSender: lastSender,
                        status: statusFollow,
                        idleHours: idleHours,
                        msgTotal: rawMsgs.length,
                        sessionId: s.id
                    });
                }
            });

            globalProcessedLeads = Array.from(leadsMap.values()).sort((a, b) => b.lastDate - a.lastDate);

            const stats = {
                totalLeads: globalProcessedLeads.length,
                vendedor: globalProcessedLeads.filter(l => l.status === 'AGUARDANDO_VENDEDOR').length,
                followAtrasado: globalProcessedLeads.filter(l => l.status === 'FOLLOW_UP_PENDENTE').length,
                cliente: globalProcessedLeads.filter(l => l.status === 'AGUARDANDO_CLIENTE').length,
                hoje: globalProcessedLeads.filter(l => l.idleHours < 24).length,
                criticos: globalProcessedLeads.filter(l => l.idleHours >= 48).length
            };

            updateDashboard(stats);
        }

        function updateDashboard(stats) {
            document.getElementById('count-leads').innerText = stats.totalLeads;
            document.getElementById('count-vendedor').innerText = stats.vendedor;
            document.getElementById('count-follow-atrasado').innerText = stats.followAtrasado;
            document.getElementById('count-cliente').innerText = stats.cliente;
            document.getElementById('count-hoje').innerText = stats.hoje;
            document.getElementById('count-criticos').innerText = stats.criticos;

            document.getElementById('pizza-pendente-val').innerText = stats.vendedor;
            document.getElementById('pizza-bola-val').innerText = (stats.vendedor + stats.followAtrasado);
            document.getElementById('pizza-tempo-val').innerText = stats.criticos;

            initCharts(stats);
            currentFilteredLeads = globalProcessedLeads;
            currentPage = 1;
            renderTable();

            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function initCharts(stats) {
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } },
                onClick: (event, elements, chart) => {
                    if (elements.length > 0) {
                        const idx = elements[0].index;
                        const label = chart.data.labels[idx];
                        togglePieFilter(label);
                    }
                }
            };

            if (chartStatus) chartStatus.destroy();
            chartStatus = new Chart(document.getElementById('chartStatus'), {
                type: 'doughnut',
                data: {
                    labels: ['Aguardando Vendedor', 'Follow-up Pendente', 'Aguardando Cliente'],
                    datasets: [{
                        data: [stats.vendedor, stats.followAtrasado, stats.cliente],
                        backgroundColor: ['#d32f2f', '#f57c00', '#1e3c72'],
                        borderWidth: 0
                    }]
                },
                options: { ...commonOptions, cutout: '70%' }
            });

            if (chartResponsabilidade) chartResponsabilidade.destroy();
            chartResponsabilidade = new Chart(document.getElementById('chartResponsabilidade'), {
                type: 'pie',
                data: {
                    labels: ['Com a Empresa', 'Com o Cliente'],
                    datasets: [{
                        data: [stats.vendedor + stats.followAtrasado, stats.cliente],
                        backgroundColor: ['#7b1fa2', '#cfd8dc']
                    }]
                },
                options: commonOptions
            });

            const tMenor24 = globalProcessedLeads.filter(l => l.idleHours < 24).length;
            const t24a48 = globalProcessedLeads.filter(l => l.idleHours >= 24 && l.idleHours < 48).length;
            const tMaior48 = stats.criticos;

            if (chartTempo) chartTempo.destroy();
            chartTempo = new Chart(document.getElementById('chartTempo'), {
                type: 'pie',
                data: {
                    labels: ['< 24h', '24h - 48h', '> 48h'],
                    datasets: [{
                        data: [tMenor24, t24a48, tMaior48],
                        backgroundColor: ['#2e7d32', '#ffa726', '#c62828']
                    }]
                },
                options: commonOptions
            });
        }

        function togglePieFilter(label) {
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter-card'));
            document.querySelectorAll('.big-num').forEach(n => n.classList.remove('active-filter-num'));

            if (activePieFilter === label) {
                activePieFilter = null;
                currentFilteredLeads = globalProcessedLeads;
            } else {
                activePieFilter = label;
                currentFilteredLeads = globalProcessedLeads.filter(lead => {
                    switch (label) {
                        case 'Aguardando Vendedor': return lead.status === 'AGUARDANDO_VENDEDOR';
                        case 'Follow-up Pendente': return lead.status === 'FOLLOW_UP_PENDENTE';
                        case 'Aguardando Cliente': return lead.status === 'AGUARDANDO_CLIENTE';
                        case 'Com a Empresa': return lead.status === 'AGUARDANDO_VENDEDOR' || lead.status === 'FOLLOW_UP_PENDENTE';
                        case 'Com o Cliente': return lead.status === 'AGUARDANDO_CLIENTE';
                        case '< 24h': return lead.idleHours < 24;
                        case '24h - 48h': return lead.idleHours >= 24 && lead.idleHours < 48;
                        case '> 48h': return lead.idleHours >= 48;
                        default: return true;
                    }
                });
            }
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const data = currentFilteredLeads;
            const totalPages = Math.ceil(data.length / itemsPerPage) || 1;

            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedData = data.slice(start, end);

            const body = document.getElementById('table-body');

            body.innerHTML = paginatedData.map(lead => {
                let statusBadge = '';
                if (lead.status === 'AGUARDANDO_VENDEDOR') {
                    statusBadge = `<span class="badge badge-urgente"><i class="fas fa-exclamation-circle"></i> RESPONDER</span>`;
                } else if (lead.status === 'FOLLOW_UP_PENDENTE') {
                    statusBadge = `<span class="badge badge-pendente"><i class="fas fa-hourglass-half"></i> COBRAR LEAD</span>`;
                } else {
                    statusBadge = `<span class="badge badge-noprazo"><i class="fas fa-check"></i> EM DIA</span>`;
                }

                let tempoOciosoStr = '';
                if (lead.idleHours === 0) {
                    tempoOciosoStr = 'Agora mesmo';
                } else if (lead.idleHours < 24) {
                    tempoOciosoStr = `${lead.idleHours} hora(s)`;
                } else {
                    tempoOciosoStr = `${Math.floor(lead.idleHours / 24)} dia(s)`;
                }

                let phoneDisplay = lead.phoneId.split('@')[0];

                return `
                <tr>
                    <td>${lead.lastDate.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })}</td>
                    <td>
                        <div style="font-weight:bold; color:#333;">${lead.name}</div>
                        <small style="color:#999;">${phoneDisplay}</small>
                    </td>
                    <td style="text-align:center">${statusBadge}</td>
                    <td><b>${lead.lastSender}</b></td>
                    <td><span class="medida-tag">${tempoOciosoStr}</span></td>
                    <td style="text-align:center">${lead.msgTotal}</td>
                    <td><a href="https://muvecom.wts.chat/chat2/sessions/${lead.sessionId}" target="_blank" class="btn-action">Ver Chat</a></td>
                </tr>
            `}).join('');

            const paginationControls = document.getElementById('pagination-controls');
            paginationControls.innerHTML = `
                <button class="pagination-btn" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>Anterior</button>
                <span class="pagination-info">Página ${currentPage} de ${totalPages} (Total: ${data.length})</span>
                <button class="pagination-btn" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>Próxima</button>
            `;
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        function resetFilter() {
            activePieFilter = null;
            document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter-card'));
            document.querySelectorAll('.big-num').forEach(n => n.classList.remove('active-filter-num'));
            currentFilteredLeads = globalProcessedLeads;
            currentPage = 1;
            renderTable();
        }
    </script>
